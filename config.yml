# ── AI TERMINAL PERSONA ───────────────────────────────────────────────────────
# These fields shape how Claude responds when visitors use !ask
# The more context you give, the better Claude sounds like you
ai_persona:
  communication_style: "direct, technical, occasionally dry"
  # Add topics you're passionate about — Claude will weave them in
  passionate_about:
    - "developer tooling"
    - "open source sustainability"
    - "performance optimization"
  # Add things you're opinionated about
  opinions:
    - "Documentation is code"
    - "Small PRs ship faster"

# ── INTEGRATIONS (configure as GitHub Secrets, not here) ─────────────────────
# WAKATIME_API_KEY  → wakatime.com/settings/account
# BLOG_RSS_URL      → your blog's RSS feed URL
# ANTHROPIC_API_KEY → console.anthropic.com (for !ask AI responses)
integrations:
  wakatime: false
  blog_rss: false
  ai_terminal: true    # set to false to disable AI responses (just use built-in replies)
