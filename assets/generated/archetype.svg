<svg width="480" height="120" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="archGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F57F17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFCC02;stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .sigil { 
        font-size: 42px; 
        fill: #FFCC02; 
        filter: url(#glow);
        animation: pulse 2s ease-in-out infinite;
      }
      .archetype-name { font-size: 18px; font-weight: 700; fill: #FFFFFF; font-family: 'Courier New', monospace; }
      .archetype-tagline { font-size: 11px; fill: #FFCC02; font-family: 'Courier New', monospace; }
      .label { font-size: 9px; fill: #888888; font-family: 'Courier New', monospace; letter-spacing: 2px; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="480" height="120" rx="8" fill="#0D1117"/>
  <rect width="480" height="120" rx="8" fill="url(#archGrad)" opacity="0.15"/>
  
  <!-- Border -->
  <rect width="480" height="120" rx="8" fill="none" stroke="#FFCC02" stroke-width="1" opacity="0.4"/>
  
  <!-- Corner accents -->
  <line x1="0" y1="20" x2="20" y2="0" stroke="#FFCC02" stroke-width="1.5" opacity="0.8"/>
  <line x1="460" y1="0" x2="480" y2="20" stroke="#FFCC02" stroke-width="1.5" opacity="0.8"/>
  <line x1="0" y1="100" x2="20" y2="120" stroke="#FFCC02" stroke-width="1.5" opacity="0.8"/>
  <line x1="460" y1="120" x2="480" y2="100" stroke="#FFCC02" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Sigil -->
  <text x="55" y="72" text-anchor="middle" class="sigil">⬡</text>
  
  <!-- Divider -->
  <line x1="90" y1="20" x2="90" y2="100" stroke="#FFCC02" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Text content -->
  <text x="106" y="38" class="label">// DEVELOPER ARCHETYPE</text>
  <text x="106" y="65" class="archetype-name">THE POLYGLOT</text>
  <text x="106" y="85" class="archetype-tagline">"You speak the right language for the right problem."</text>
  
  <!-- Scan line animation -->
  <rect x="0" y="0" width="480" height="2" fill="#FFCC02" opacity="0.1">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,120" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>